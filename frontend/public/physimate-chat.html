<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>PhysiMate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="physimate-style.css">
</head>
<body>
    <div class="app-shell">

        <!-- History Sidebar -->
        <aside class="history-panel" id="history-panel" aria-label="Animation history">
            <div class="history-header">
                <span>History</span>
                <button class="icon-btn" id="close-history" aria-label="Close history">✕</button>
            </div>
            <ul class="history-list" id="history-list">
                <li class="history-empty">No animations yet</li>
            </ul>
        </aside>

        <!-- Main chat area -->
        <div class="chat-app" id="chat-app">
            <header class="chat-header">
                <div class="header-left">
                    <button class="icon-btn history-toggle" id="toggle-history" aria-label="Toggle history" title="Animation history">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="1 4 1 10 7 10"></polyline>
                            <path d="M3.51 15a9 9 0 1 0 .49-4.99"></path>
                        </svg>
                    </button>
                    <div class="logo-icon"></div>
                    <h1>Physi<span class="highlight">Mate</span></h1>
                </div>
                <div class="header-right">
                    <label class="quality-label" for="quality-select">Quality</label>
                    <select id="quality-select" class="quality-select" title="Render quality">
                        <option value="low" selected>Fast (480p)</option>
                        <option value="medium">HD (720p)</option>
                        <option value="high">4K (1080p)</option>
                    </select>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-screen" id="welcome-screen">
                    <div class="welcome-icon"></div>
                    <h2>What do you want to learn?</h2>
                    <p>Ask any physics question — get a live interactive simulation <em>and</em> a beautiful video explanation.</p>
                    <div class="suggestion-chips">
                        <button class="chip" data-q="How does a pendulum work? Show me the forces involved.">Pendulum forces</button>
                        <button class="chip" data-q="Show me projectile motion with velocity components.">Projectile motion</button>
                        <button class="chip" data-q="Show me an elastic collision between two balls m1=2 m2=1.">Elastic collision</button>
                        <button class="chip" data-q="Explain Newton's second law with a block on a surface.">Newton's 2nd law</button>
                        <button class="chip" data-q="Show spring-mass oscillation with k=8 m=2.">Spring oscillation</button>
                        <button class="chip" data-q="Show a block sliding down a frictionless inclined plane.">Inclined plane</button>
                    </div>
                </div>
            </div>

            <div class="chat-input-bar">
                <div class="input-wrapper">
                    <textarea id="chat-input" placeholder="Ask a physics question..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" aria-label="Send">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
                <p class="input-hint">Live simulation + Manim video · <strong>Fast</strong> mode renders quickest</p>
            </div>
        </div>
    </div>

    <!-- Marked (Markdown renderer) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
    <!-- Matter.js physics engine -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Interactive simulator class -->
    <script src="physimate-simulator.js"></script>
    <!-- Main chatbot logic -->
    <script src="physimate-script.js"></script>
</body>
</html>
